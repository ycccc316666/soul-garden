<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soul Landscape | 心靈景觀</title>
    <style>
        :root { --primary: #475569; --glass: rgba(255, 255, 255, 0.9); }
        body { margin: 0; font-family: 'Noto Sans TC', sans-serif; background: #f1f5f9; overflow: hidden; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%); display: flex; justify-content: center; align-items: center; z-index: 100; }
        .login-box { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        #garden { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .ui-panel { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 10; background: var(--glass); backdrop-filter: blur(10px); padding: 20px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 400px; }
        .row { display: flex; gap: 8px; margin-bottom: 8px; }
        input, button { border-radius: 12px; border: 1px solid #ddd; padding: 12px; font-size: 14px; outline: none; box-sizing: border-box; }
        input[type="text"], input[type="password"], input[type="datetime-local"] { flex: 1; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .type-btn { flex: 1; border: 2px solid #ddd; background: white; color: #666; }
        .type-btn.active.good { border-color: #fb7185; color: #e11d48; background: #fff1f2; }
        .type-btn.active.bad { border-color: #64748b; color: #1e293b; background: #f1f5f9; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2 style="color:#475569">Soul Landscape</h2>
        <input type="text" id="user" placeholder="帳號" style="width:100%; margin-bottom:10px;">
        <input type="password" id="pass" placeholder="密碼" style="width:100%; margin-bottom:20px;">
        <div style="display: flex; gap: 10px;">
            <button onclick="login()" style="flex:1;">登入</button>
            <button onclick="register()" style="flex:1; background:#94a3b8;">註冊</button>
        </div>
    </div>
</div>

<canvas id="garden"></canvas>

<div class="ui-panel" id="main-ui" style="display:none;">
    <div class="row">
        <button class="type-btn active good" id="btn-good" onclick="setType('good')">🌸 好事</button>
        <button class="type-btn bad" id="btn-bad" onclick="setType('bad')">🪨 壞事</button>
    </div>
    <div class="row">
        <input type="text" id="content" placeholder="當下的紀錄...">
        <input type="color" id="color-picker" value="#fda4af" style="width:50px; height:45px;">
    </div>
    <div class="row">
        <input type="datetime-local" id="time-picker">
        <button onclick="submitEntry()">種下</button>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbziJ1ZV8K_gX8_v7X0yYJ9-dvjj85MBmLykB4mgvFz6gEeyPnPR3Gw2zLV6FZ0sFryxwA/exec"; // 改成你的網址
    let currentUser = "", currentType = "good";
    const canvas = document.getElementById('garden'), ctx = canvas.getContext('2d');

    function initCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', initCanvas); initCanvas();

    const now = new Date(); now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
    document.getElementById('time-picker').value = now.toISOString().slice(0, 16);

    function setType(t) {
        currentType = t;
        document.getElementById('btn-good').classList.toggle('active', t === 'good');
        document.getElementById('btn-bad').classList.toggle('active', t === 'bad');
        if(t === 'bad') document.getElementById('color-picker').value = "#94a3b8";
    }

    async function register() {
        const u = document.getElementById('user').value, p = document.getElementById('pass').value;
        if (!u || !p) return alert("請輸入帳密");
        const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'register', username: u, password: p })});
        const status = await res.text();
        alert(status === "success" ? "註冊成功，請登入！" : (status === "exists" ? "帳號已存在" : "失敗"));
    }

    async function login() {
        const u = document.getElementById('user').value, p = document.getElementById('pass').value;
        const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'login', username: u, password: p })});
        if (await res.text() === "success") {
            currentUser = u; document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block'; loadLandscape();
        } else alert("帳密錯誤");
    }

    function drawFlower(x, y, size, color) {
        ctx.save(); ctx.translate(x, y); ctx.fillStyle = color;
        for(let i=0; i<5; i++) { ctx.beginPath(); ctx.rotate(Math.PI*2/5); ctx.ellipse(0, size/2, size/4, size/1.2, 0, 0, Math.PI*2); ctx.fill(); }
        ctx.beginPath(); ctx.arc(0, 0, size/4, 0, Math.PI*2); ctx.fillStyle = '#fff3b0'; ctx.fill(); ctx.restore();
    }

    function drawRock(x, y, size, color) {
        ctx.save(); ctx.translate(x, y); ctx.fillStyle = color;
        ctx.beginPath(); ctx.moveTo(-size, 0); ctx.lineTo(-size*0.6, -size*0.8); ctx.lineTo(size*0.3, -size); ctx.lineTo(size, -size*0.4); ctx.lineTo(size*0.5, size*0.5); ctx.closePath(); ctx.fill(); ctx.restore();
    }

    async function submitEntry() {
        const content = document.getElementById('content').value, color = document.getElementById('color-picker').value, time = document.getElementById('time-picker').value;
        if(!content) return;
        await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'save', username: currentUser, content, type: currentType, color, size: 20 + Math.min(content.length * 2, 40), logTime: time })});
        document.getElementById('content').value = ""; loadLandscape();
    }

    async function loadLandscape() {
        const res = await fetch(API_URL), data = await res.json();
        ctx.clearRect(0,0,canvas.width,canvas.height);
        data.filter(d => d[0] === currentUser).forEach(item => {
            const x = Math.random() * (canvas.width - 100) + 50, y = Math.random() * (canvas.height - 300) + 100;
            if(item[3] === 'good') drawFlower(x, y, item[5], item[4]); else drawRock(x, y, item[5], item[4]);
        });
    }
</script>
</body>
</html>
